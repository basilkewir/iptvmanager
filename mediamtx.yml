###############################################################################
# MediaMTX — IPTV Manager relay server
# Accepts RTMP push from engine, re-distributes as RTMP, RTSP, HLS, SRT, UDP
###############################################################################

# Logging
logLevel: info
logDestinations: [stdout]

# REST API — used by the IPTV Manager engine to register stream paths
api: yes
apiAddress: :9997

# RTMP server (accepts our engine's push on port 1935)
rtmp: yes
rtmpAddress: :1935

# RTSP server (VLC, set-top boxes, Flussonic)
rtsp: yes
rtspAddress: :8554
rtspsAddress: :8322
rtspDisable: no

# HLS server (browsers, Flussonic)
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# SRT server
srt: yes
srtAddress: :8890

# WebRTC
webrtc: yes
webrtcAddress: :8889

###############################################################################
# Paths
# Per-stream paths are registered dynamically via the MediaMTX API by the
# IPTV Manager engine when each stream is added. The catch-all below ensures
# any stream works even before API registration completes.
###############################################################################
paths:

  # ── Catch-all — accepts any publisher on live/<key> ─────────────────────
  "~^live/(.+)$":
    source: publisher
